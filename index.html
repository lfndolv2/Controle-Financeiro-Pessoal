<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Finança">
<meta name="theme-color" content="#0F1117">
<title>Finança — Controle Pessoal</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#0F1117;--surface:#181C27;--card:#1E2436;--border:#2A3050;--accent:#4F8EF7;--green:#2DD4BF;--red:#F87171;--yellow:#FBBF24;--purple:#A78BFA;--muted:#6B7A99;--text:#E8EBF4;--soft:#9AA3BD;}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;overflow-x:hidden}
input,select,button{font-family:inherit}
input:focus,select:focus{outline:2px solid var(--accent)}
#header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:50}
#logo{font-weight:800;font-size:17px;letter-spacing:-0.5px}
#logo small{display:block;color:var(--muted);font-size:10px;font-weight:400}
#month-nav{display:flex;align-items:center;gap:8px}
#month-nav button{background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:4px 10px;cursor:pointer;font-size:16px}
#month-label{font-weight:700;font-size:14px;min-width:80px;text-align:center}
#btn-add-main{background:var(--accent);border:none;color:#fff;border-radius:12px;padding:8px 16px;cursor:pointer;font-weight:700;font-size:14px}
#nav{background:var(--surface);border-bottom:1px solid var(--border);display:flex;overflow-x:auto;padding:0 4px;-webkit-overflow-scrolling:touch}
#nav::-webkit-scrollbar{display:none}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;cursor:pointer;padding:8px 10px;font-size:10px;font-weight:600;color:var(--muted);border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s}
.nav-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.nav-btn span.ico{font-size:16px}
#content{max-width:860px;margin:0 auto;padding:16px 12px 100px}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:14px}
.card-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px}
.kpi-label{color:var(--muted);font-size:11px;font-weight:600;margin-bottom:4px}
.kpi-value{font-size:18px;font-weight:800}
.badge{display:inline-block;border-radius:6px;padding:2px 8px;font-size:11px;font-weight:600}
.bar-track{background:var(--border);border-radius:6px;height:8px;overflow:hidden}
.bar-fill{border-radius:6px;height:8px;transition:width .4s}
#modal-overlay{display:none;position:fixed;inset:0;background:#00000099;z-index:100;align-items:flex-end;justify-content:center;padding:0}
#modal-overlay.open{display:flex}
.modal-box{background:var(--card);border:1px solid var(--border);border-radius:20px 20px 0 0;padding:24px 20px 36px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto}
.modal-title{font-size:17px;font-weight:800;margin-bottom:18px;display:flex;justify-content:space-between;align-items:center}
.modal-close{background:none;border:none;color:var(--muted);font-size:24px;cursor:pointer;line-height:1}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.form-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px}
.form-group{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.form-group label{font-size:11px;color:var(--muted);font-weight:600}
.form-group input,.form-group select{background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);padding:10px 12px;font-size:14px;width:100%}
.form-group select option{background:var(--surface)}
.type-toggle{display:flex;gap:8px;margin-bottom:14px}
.type-btn{flex:1;padding:8px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-weight:600;font-size:14px;transition:all .15s}
.type-btn.active-receita{background:#2DD4BF22;border-color:var(--green);color:var(--green)}
.type-btn.active-despesa{background:#F8717122;border-color:var(--red);color:var(--red)}
.check-row{display:flex;gap:6px;align-items:center;color:var(--soft);font-size:13px;cursor:pointer;margin-bottom:8px}
.check-row input{width:16px;height:16px;accent-color:var(--accent)}
.btn-save{background:var(--accent);border:none;color:#fff;border-radius:12px;padding:12px;width:100%;font-size:15px;font-weight:700;cursor:pointer;margin-top:6px}
.btn-cancel{background:none;border:1px solid var(--border);color:var(--muted);border-radius:12px;padding:12px;width:100%;font-size:14px;cursor:pointer;margin-top:6px}
.entry-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px;border-left-width:3px}
.entry-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.entry-desc{font-weight:600;font-size:14px;margin-bottom:4px}
.entry-badges{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.entry-value{font-size:16px;font-weight:800;white-space:nowrap}
.entry-actions{display:flex;gap:6px;margin-top:10px;justify-content:flex-end;flex-wrap:wrap}
.btn-sm{border-radius:8px;padding:5px 11px;font-size:12px;cursor:pointer;border:1px solid;font-weight:600}
.proj-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.proj-card{background:var(--surface);border-radius:12px;padding:12px;border:1px solid var(--border)}
.proj-label{color:var(--muted);font-size:10px;font-weight:600;margin-bottom:6px}
.proj-r{color:var(--green);font-size:12px}.proj-d{color:var(--red);font-size:12px}
.proj-s{font-weight:800;font-size:13px;margin-top:4px}
.anual-table{width:100%;border-collapse:collapse;font-size:13px}
.anual-table th{color:var(--muted);font-weight:600;padding:6px 8px;text-align:right;border-bottom:1px solid var(--border)}
.anual-table th:first-child{text-align:left}
.anual-table td{padding:8px;border-bottom:1px solid var(--border);text-align:right}
.anual-table td:first-child{text-align:left;color:var(--text);cursor:pointer}
.anual-table tr:hover td{background:var(--accent)11}
.bar-chart{display:flex;gap:6px;align-items:flex-end;height:120px;overflow-x:auto;padding-bottom:4px}
.bar-col{display:flex;flex-direction:column;align-items:center;gap:2px;min-width:44px;flex:1}
.bar-pair{display:flex;gap:2px;align-items:flex-end;height:100px}
.bar{border-radius:4px 4px 0 0;min-height:2px;transition:height .4s;width:12px}
.bar-month{color:var(--muted);font-size:9px;cursor:pointer}
.bar-saldo{font-size:9px;font-weight:700}
.goal-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px;border-left-width:3px}
#fab{position:fixed;bottom:24px;right:20px;background:var(--accent);border:none;color:#fff;border-radius:50%;width:56px;height:56px;font-size:28px;cursor:pointer;box-shadow:0 4px 24px #4F8EF755;z-index:49;display:flex;align-items:center;justify-content:center}
#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#1E2436;border:1px solid var(--accent);color:var(--text);padding:10px 20px;border-radius:12px;font-size:13px;font-weight:600;opacity:0;transition:opacity .3s;z-index:200;white-space:nowrap}
#toast.show{opacity:1}
.filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.pill{border-radius:20px;padding:5px 14px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);transition:all .15s}
.pill.active{background:var(--accent)22;border-color:var(--accent);color:var(--accent)}
.pill.g.active{background:var(--green)22;border-color:var(--green);color:var(--green)}
.pill.r.active{background:var(--red)22;border-color:var(--red);color:var(--red)}
.empty{color:var(--muted);text-align:center;padding:32px 16px;font-size:14px}
.del-sheet{background:var(--card);border:1px solid var(--border);border-radius:20px 20px 0 0;padding:24px 20px 36px;width:100%;max-width:480px}
.del-opt{display:flex;align-items:center;gap:12px;padding:14px;border-radius:12px;border:1px solid var(--border);cursor:pointer;margin-bottom:10px;transition:background .15s}
.del-opt:hover{background:var(--surface)}
.del-opt-icon{font-size:22px}
.del-opt-title{font-weight:700;font-size:14px}
.del-opt-sub{color:var(--muted);font-size:12px;margin-top:2px}
/* Categorias */
.cat-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px;display:flex;align-items:center;gap:12px}
.cat-icon-big{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.cat-info{flex:1}
.cat-name{font-weight:700;font-size:14px}
.cat-meta{color:var(--muted);font-size:12px;margin-top:2px}
.cat-actions{display:flex;gap:6px}
.cat-default-badge{font-size:10px;color:var(--muted);background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:2px 6px}
/* Emoji picker */
.emoji-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;max-height:200px;overflow-y:auto;background:var(--surface);border-radius:10px;padding:10px;border:1px solid var(--border)}
.emoji-btn{font-size:22px;background:none;border:2px solid transparent;border-radius:8px;cursor:pointer;padding:4px;text-align:center;transition:all .1s}
.emoji-btn:hover,.emoji-btn.sel{background:var(--border);border-color:var(--accent)}
/* Color picker */
.color-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
.color-dot{width:28px;height:28px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:border .15s;flex-shrink:0}
.color-dot.sel{border-color:white}
/* Vencimento */
.vence-hoje{animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
@media(min-width:600px){
  .card-grid{grid-template-columns:repeat(4,1fr)}
  .proj-grid{grid-template-columns:repeat(6,1fr)}
  #modal-overlay{align-items:center;padding:20px}
  .modal-box,.del-sheet{border-radius:20px}
}
</style>
</head>
<body>

<div id="header">
  <div id="logo">💰 Finança<small>controle pessoal</small></div>
  <div id="month-nav">
    <button onclick="changeMonth(-1)">‹</button>
    <div id="month-label"></div>
    <button onclick="changeMonth(1)">›</button>
  </div>
  <button id="btn-add-main" onclick="openModal()">+ Lançar</button>
</div>

<div id="nav">
  <button class="nav-btn active" onclick="setTab('dashboard')" id="tab-dashboard"><span class="ico">📊</span>Dashboard</button>
  <button class="nav-btn" onclick="setTab('lancamentos')" id="tab-lancamentos"><span class="ico">📋</span>Lançamentos</button>
  <button class="nav-btn" onclick="setTab('metas')" id="tab-metas"><span class="ico">🎯</span>Metas</button>
  <button class="nav-btn" onclick="setTab('anual')" id="tab-anual"><span class="ico">📅</span>Anual</button>
  <button class="nav-btn" onclick="setTab('categorias')" id="tab-categorias"><span class="ico">🏷️</span>Categorias</button>
</div>

<div id="content"></div>
<button id="fab" onclick="openModal()">+</button>
<div id="toast"></div>
<div id="modal-overlay"><div class="modal-box" id="modal-box"></div></div>

<script>
const MONTHS=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];

// Categorias padrão (nunca removíveis)
const DEFAULT_CATS={
  receita:     {label:'Receita',     color:'#2DD4BF',icon:'💵',isDefault:true},
  moradia:     {label:'Moradia',     color:'#60A5FA',icon:'🏠',isDefault:true},
  alimentacao: {label:'Alimentação', color:'#FBBF24',icon:'🍽️',isDefault:true},
  transporte:  {label:'Transporte',  color:'#F97316',icon:'🚗',isDefault:true},
  saude:       {label:'Saúde',       color:'#34D399',icon:'❤️',isDefault:true},
  lazer:       {label:'Lazer',       color:'#A78BFA',icon:'🎉',isDefault:true},
  educacao:    {label:'Educação',    color:'#38BDF8',icon:'📚',isDefault:true},
  vestuario:   {label:'Vestuário',   color:'#FB7185',icon:'👕',isDefault:true},
  investimento:{label:'Investimento',color:'#2DD4BF',icon:'📈',isDefault:true},
  outros:      {label:'Outros',      color:'#6B7A99',icon:'📦',isDefault:true},
};

const CAT_COLORS=['#2DD4BF','#4F8EF7','#A78BFA','#FBBF24','#F87171','#34D399','#F97316','#FB7185','#38BDF8','#60A5FA','#E879F9','#6B7A99','#84CC16','#F59E0B','#EC4899'];
const CAT_EMOJIS=['🏠','🍽️','🚗','❤️','🎉','📚','👕','📈','📦','💵','🎮','✈️','💊','🐾','🛒','☕','🍺','🎵','💻','📱','⚡','💧','📞','🎓','🏋️','🧴','🎁','🏦','💰','🍕','🚌','⛽','🏥','🛡️','💼','🧾','🔧','🏪','🎨','🌿'];

const today=new Date();
const todayDay=today.getDate();
let viewMonth=today.getMonth(), viewYear=today.getFullYear();
let currentTab='dashboard', filterType='all', filterCat='all';

function load(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch(e){return d;}}
function save(k,v){localStorage.setItem(k,JSON.stringify(v));}

let entries=load('fin_entries',[]);
let goals=load('fin_goals',[]);
let budget=load('fin_budget',5000);
let customCats=load('fin_cats',{}); // cats adicionadas/editadas pelo usuário

// CATS = merge de defaults + customizações
function getCats(){
  const merged={...DEFAULT_CATS};
  // aplicar edições do usuário sobre as defaults
  Object.entries(customCats).forEach(([k,v])=>{
    if(v===null){delete merged[k];}  // deletado
    else merged[k]={...merged[k],...v};
  });
  return merged;
}

function saveAll(){save('fin_entries',entries);save('fin_goals',goals);save('fin_budget',budget);save('fin_cats',customCats);}
function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}
function fmt(v){return new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(v||0);}
function fmtS(v){const n=Math.abs(v||0);if(n>=1000)return(v<0?'-':'')+'R$'+(n/1000).toFixed(1)+'k';return fmt(v);}
function monthEntries(m,y){return entries.filter(e=>e.month===m&&e.year===y);}
function calcMonth(m,y){
  const me=monthEntries(m,y);
  const receitas=me.filter(e=>e.type==='receita').reduce((s,e)=>s+e.value,0);
  const despesas=me.filter(e=>e.type==='despesa').reduce((s,e)=>s+e.value,0);
  return{receitas,despesas,saldo:receitas-despesas,pendentes:me.filter(e=>!e.paid&&e.type==='despesa')};
}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}

function catOf(key){const c=getCats();return c[key]||{label:key,color:'#6B7A99',icon:'📦'};}

// Vencimento
function vencInfo(e){
  if(!e.dueDay||e.paid)return null;
  if(e.month!==today.getMonth()||e.year!==today.getFullYear())return null;
  const diff=e.dueDay-todayDay;
  if(diff<0)  return{label:`Venceu dia ${e.dueDay}`,color:'var(--red)',   urgent:true};
  if(diff===0)return{label:'Vence HOJE',            color:'var(--red)',   urgent:true};
  if(diff<=3) return{label:`Vence em ${diff}d`,     color:'var(--yellow)',urgent:true};
  return       {label:`Vence dia ${e.dueDay}`,      color:'var(--muted)', urgent:false};
}
function vencBadge(e){
  if(!e.dueDay)return'';
  if(e.paid)return`<span class="badge" style="background:#2DD4BF22;color:var(--green)">✓ Pago</span>`;
  const v=vencInfo(e);
  const color=v?v.color:'var(--muted)';
  const label=v?v.label:`Dia ${e.dueDay}`;
  const pulse=v&&v.urgent?'vence-hoje':'';
  return`<span class="badge ${pulse}" style="background:${color}22;color:${color}">📅 ${label}</span>`;
}

function changeMonth(d){const dt=new Date(viewYear,viewMonth+d);viewMonth=dt.getMonth();viewYear=dt.getFullYear();render();}
function setTab(tab){currentTab=tab;document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));document.getElementById('tab-'+tab).classList.add('active');render();}
function setFilter(k,v){if(k==='type')filterType=v;if(k==='cat')filterCat=v;render();}
function setBudget(v){budget=parseFloat(v)||0;saveAll();render();}
function setViewMonth(i){viewMonth=i;setTab('dashboard');}
function togglePaid(id){entries=entries.map(e=>e.id===id?{...e,paid:!e.paid}:e);saveAll();render();toast('Atualizado!');}

function render(){
  document.getElementById('month-label').textContent=MONTHS[viewMonth]+' '+viewYear;
  const c=document.getElementById('content');
  if(currentTab==='dashboard')   c.innerHTML=renderDashboard();
  if(currentTab==='lancamentos') c.innerHTML=renderLancamentos();
  if(currentTab==='metas')       c.innerHTML=renderMetas();
  if(currentTab==='anual')       c.innerHTML=renderAnual();
  if(currentTab==='categorias')  c.innerHTML=renderCategorias();
}

// ── DASHBOARD ─────────────────────────────────────────────────────────────────
function renderDashboard(){
  const CATS=getCats();
  const{receitas,despesas,saldo,pendentes}=calcMonth(viewMonth,viewYear);
  const totalPend=pendentes.reduce((s,e)=>s+e.value,0);
  const pct=Math.min(100,(despesas/budget)*100);
  const bColor=pct>90?'var(--red)':pct>70?'var(--yellow)':'var(--green)';
  const catMap={};
  monthEntries(viewMonth,viewYear).filter(e=>e.type==='despesa').forEach(e=>{catMap[e.cat]=(catMap[e.cat]||0)+e.value;});
  const catList=Object.entries(catMap).sort((a,b)=>b[1]-a[1]);
  let projHTML='';
  for(let i=0;i<6;i++){const rawM=viewMonth+i;const m=rawM%12;const y=viewYear+Math.floor(rawM/12);const{receitas:r,despesas:d,saldo:s}=calcMonth(m,y);
    projHTML+=`<div class="proj-card" style="border-color:${s<0?'#F8717133':'var(--border)'}"><div class="proj-label">${MONTHS[m]}/${y}</div><div class="proj-r">↑ ${fmtS(r)}</div><div class="proj-d">↓ ${fmtS(d)}</div><div class="proj-s" style="color:${s>=0?'var(--accent)':'var(--red)'}">${fmtS(s)}</div></div>`;}
  const pendSorted=[...pendentes].sort((a,b)=>(a.dueDay||99)-(b.dueDay||99));
  const urgentes=pendSorted.filter(e=>{const v=vencInfo(e);return v&&v.urgent;});
  let alertHTML='';
  if(urgentes.length){alertHTML=`<div class="card" style="border-color:#F8717166;margin-bottom:14px"><div style="color:var(--red);font-weight:700;margin-bottom:10px">🚨 Atenção urgente (${urgentes.length})</div>${urgentes.map(e=>{const v=vencInfo(e);return`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)"><div><div style="font-size:14px;font-weight:600">${e.desc}</div><div style="font-size:12px;color:${v.color};font-weight:600">${v.label}</div></div><div style="display:flex;gap:8px;align-items:center"><span style="color:var(--red);font-weight:700">${fmt(e.value)}</span><button class="btn-sm" style="background:#2DD4BF22;border-color:var(--green);color:var(--green)" onclick="togglePaid('${e.id}')">Pagar</button></div></div>`;}).join('')}</div>`;}
  let pendHTML='';
  if(pendSorted.length){pendHTML=`<div class="card" style="border-color:#FBBF2444"><div style="color:var(--yellow);font-weight:700;margin-bottom:10px">⏳ Pendentes este mês (${pendSorted.length})</div>${pendSorted.map(e=>{const v=vencInfo(e);const dueColor=v?v.color:'var(--muted)';const dueLabel=e.dueDay?(v?v.label:`Dia ${e.dueDay}`):'Sem vencimento';return`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)"><div><div style="font-size:14px">${e.desc}</div><div style="font-size:11px;color:${dueColor};margin-top:2px">📅 ${dueLabel}${e.parcelas>1?` · ${e.parcelaAtual}/${e.parcelas}x`:''}</div></div><div style="display:flex;gap:8px;align-items:center"><span style="color:var(--red);font-weight:700">${fmt(e.value)}</span><button class="btn-sm" style="background:#2DD4BF22;border-color:var(--green);color:var(--green)" onclick="togglePaid('${e.id}')">Pagar</button></div></div>`;}).join('')}</div>`;}
  return`${alertHTML}<div class="card-grid">
    <div class="kpi"><div class="kpi-label">Receitas</div><div class="kpi-value" style="color:var(--green)">${fmt(receitas)}</div></div>
    <div class="kpi"><div class="kpi-label">Despesas</div><div class="kpi-value" style="color:var(--red)">${fmt(despesas)}</div></div>
    <div class="kpi"><div class="kpi-label">Saldo</div><div class="kpi-value" style="color:${saldo>=0?'var(--green)':'var(--red)'}">${fmt(saldo)}</div></div>
    <div class="kpi"><div class="kpi-label">A pagar</div><div class="kpi-value" style="color:var(--yellow)">${fmt(totalPend)}</div></div>
  </div>
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:8px">
      <div><div style="color:var(--muted);font-size:12px;font-weight:600">Limite mensal de despesas</div><div style="font-weight:700;margin-top:2px">${fmt(despesas)} <span style="color:var(--muted)">/ ${fmt(budget)}</span></div></div>
      <div style="display:flex;gap:8px;align-items:center"><span class="badge" style="background:${bColor}22;color:${bColor}">${pct.toFixed(0)}%</span>
      <input type="number" value="${budget}" onchange="setBudget(this.value)" style="background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:4px 8px;width:90px;font-size:13px"></div>
    </div>
    <div class="bar-track"><div class="bar-fill" style="background:${bColor};width:${pct}%"></div></div>
  </div>
  <div class="card"><div style="font-weight:700;margin-bottom:14px">Gastos por categoria</div>
    ${catList.length===0?'<div class="empty">Nenhum gasto neste mês.</div>':catList.map(([cat,val])=>{const c=catOf(cat);return`<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px"><span style="font-size:18px">${c.icon}</span><span style="color:var(--soft);font-size:12px;width:80px;flex-shrink:0">${c.label}</span><div style="flex:1;background:var(--border);border-radius:4px;height:6px"><div style="background:${c.color};border-radius:4px;height:6px;width:${despesas>0?((val/despesas)*100).toFixed(0):0}%"></div></div><span style="font-size:13px;font-weight:700;width:80px;text-align:right">${fmt(val)}</span><span style="color:var(--muted);font-size:11px;width:32px;text-align:right">${despesas>0?((val/despesas)*100).toFixed(0):0}%</span></div>`;}).join('')}
  </div>
  <div class="card"><div style="font-weight:700;margin-bottom:12px">Projeção — próximos 6 meses</div><div class="proj-grid">${projHTML}</div></div>
  ${pendHTML}`;
}

// ── LANÇAMENTOS ───────────────────────────────────────────────────────────────
function renderLancamentos(){
  const CATS=getCats();
  let list=monthEntries(viewMonth,viewYear);
  if(filterType!=='all')list=list.filter(e=>e.type===filterType);
  if(filterCat!=='all') list=list.filter(e=>e.cat===filterCat);
  list=list.sort((a,b)=>(a.dueDay||99)-(b.dueDay||99));
  const catOpts=Object.entries(CATS).map(([k,v])=>`<option value="${k}"${filterCat===k?' selected':''}>${v.icon} ${v.label}</option>`).join('');
  const cards=list.length===0?'<div class="empty">Nenhum lançamento. Toque em + para adicionar.</div>':list.map(e=>{
    const cat=catOf(e.cat);const bc=e.type==='receita'?'var(--green)':cat.color;
    const vi=vencInfo(e);const isGroup=e.parcelas>1||e.recurring;
    const cardBorder=vi&&vi.urgent&&!e.paid?vi.color:bc;
    return`<div class="entry-card" style="border-left-color:${cardBorder}">
      <div class="entry-top">
        <div style="display:flex;gap:10px;align-items:flex-start;flex:1">
          <span style="font-size:22px;flex-shrink:0">${cat.icon}</span>
          <div style="flex:1"><div class="entry-desc">${e.desc}</div>
            <div class="entry-badges">
              <span class="badge" style="background:${cat.color}22;color:${cat.color}">${cat.label}</span>
              ${e.parcelas>1?`<span class="badge" style="background:#A78BFA22;color:var(--purple)">${e.parcelaAtual}/${e.parcelas}x`:''}
              ${e.recurring?`<span class="badge" style="background:var(--accent)22;color:var(--accent)">Recorrente</span>`:''}
              ${e.type==='despesa'?vencBadge(e):`<span class="badge" style="background:${e.paid?'#2DD4BF22':'#FBBF2422'};color:${e.paid?'var(--green)':'var(--yellow)'}">${e.paid?'✓ Recebido':'Pendente'}</span>`}
            </div>
          </div>
        </div>
        <div style="text-align:right;flex-shrink:0"><div class="entry-value" style="color:${e.type==='receita'?'var(--green)':'var(--red)'}">${e.type==='receita'?'+':'-'}${fmt(e.value)}</div></div>
      </div>
      <div class="entry-actions">
        <button class="btn-sm" style="background:${e.paid?'#FBBF2422':'#2DD4BF22'};border-color:${e.paid?'var(--yellow)':'var(--green)'};color:${e.paid?'var(--yellow)':'var(--green)'}" onclick="togglePaid('${e.id}')">${e.paid?'Desfazer':'✓ Pagar'}</button>
        <button class="btn-sm" style="background:#4F8EF722;border-color:var(--accent);color:var(--accent)" onclick="openEditModal('${e.id}')">✏️ Editar</button>
        <button class="btn-sm" style="background:#F8717122;border-color:var(--red);color:var(--red)" onclick="${isGroup?`openDeleteSheet('${e.id}')`:`confirmDelete('${e.id}')`}">🗑️ Excluir</button>
      </div>
    </div>`;
  }).join('');
  return`<div class="filter-row">
    <button class="pill ${filterType==='all'?'active':''}" onclick="setFilter('type','all')">Todos</button>
    <button class="pill g ${filterType==='receita'?'active':''}" onclick="setFilter('type','receita')">↑ Receitas</button>
    <button class="pill r ${filterType==='despesa'?'active':''}" onclick="setFilter('type','despesa')">↓ Despesas</button>
    <select onchange="setFilter('cat',this.value)" style="background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:20px;padding:5px 12px;font-size:12px">
      <option value="all"${filterCat==='all'?' selected':''}>Todas as cats.</option>${catOpts}
    </select>
  </div>${cards}`;
}

// ── METAS ─────────────────────────────────────────────────────────────────────
function renderMetas(){
  const cards=goals.length===0?'<div class="empty">Nenhuma meta ainda. Crie sua primeira! 🎯</div>':goals.map(g=>{
    const pct=Math.min(100,(g.current/g.target)*100);
    return`<div class="goal-card" style="border-left-color:${g.color||'var(--purple)'}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
        <div><div style="font-weight:700;font-size:15px">${g.name}</div>${g.deadline?`<div style="color:var(--muted);font-size:11px;margin-top:2px">Prazo: ${g.deadline}</div>`:''}</div>
        <div style="text-align:right"><div style="color:${g.color};font-weight:800;font-size:18px">${pct.toFixed(0)}%</div><div style="color:var(--muted);font-size:11px">${fmt(g.current)} / ${fmt(g.target)}</div></div>
      </div>
      <div class="bar-track" style="margin-bottom:10px"><div class="bar-fill" style="background:${g.color};width:${pct}%"></div></div>
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
        <div style="color:var(--muted);font-size:13px">Faltam <strong style="color:var(--text)">${fmt(g.target-g.current)}</strong></div>
        <div style="display:flex;gap:6px;align-items:center">
          <input type="number" placeholder="+ aportar" id="aporte-${g.id}" style="background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:4px 8px;width:90px;font-size:12px">
          <button class="btn-sm" style="background:var(--green)22;border-color:var(--green);color:var(--green)" onclick="aportar('${g.id}')">Aportar</button>
          <button class="btn-sm" style="background:#F8717122;border-color:var(--red);color:var(--red)" onclick="deleteGoal('${g.id}')">✕</button>
        </div>
      </div>
    </div>`;
  }).join('');
  return`<div style="display:flex;justify-content:flex-end;margin-bottom:14px"><button onclick="openGoalModal()" style="background:#A78BFA22;border:1px solid var(--purple);color:var(--purple);border-radius:10px;padding:8px 16px;cursor:pointer;font-weight:700">+ Nova Meta</button></div>${cards}`;
}

// ── ANUAL ─────────────────────────────────────────────────────────────────────
function renderAnual(){
  const months=Array.from({length:12},(_,i)=>({...calcMonth(i,viewYear),i}));
  const maxVal=Math.max(...months.map(m=>Math.max(m.receitas,m.despesas)),1);
  const totalR=months.reduce((s,m)=>s+m.receitas,0);
  const totalD=months.reduce((s,m)=>s+m.despesas,0);
  const bars=months.map(m=>`<div class="bar-col"><div class="bar-saldo" style="color:${m.saldo>=0?'var(--green)':'var(--red)'}">${fmtS(m.saldo)}</div><div class="bar-pair"><div class="bar" style="background:var(--green);height:${(m.receitas/maxVal)*100}px"></div><div class="bar" style="background:var(--red);height:${(m.despesas/maxVal)*100}px"></div></div><div class="bar-month" onclick="setViewMonth(${m.i})">${MONTHS[m.i]}</div></div>`).join('');
  const rows=months.map(m=>`<tr onclick="setViewMonth(${m.i})" style="${viewMonth===m.i&&viewYear===today.getFullYear()?'background:var(--accent)11':''}"><td>${MONTHS[m.i]}</td><td style="color:var(--green)">${fmt(m.receitas)}</td><td style="color:var(--red)">${fmt(m.despesas)}</td><td style="color:${m.saldo>=0?'var(--green)':'var(--red)'};font-weight:700">${fmt(m.saldo)}</td><td style="color:var(--accent)">${m.receitas>0?((m.saldo/m.receitas)*100).toFixed(1):0}%</td></tr>`).join('');
  return`<div class="card-grid" style="grid-template-columns:repeat(3,1fr);margin-bottom:14px">
    <div class="kpi"><div class="kpi-label">Total Receitas</div><div class="kpi-value" style="color:var(--green);font-size:15px">${fmt(totalR)}</div></div>
    <div class="kpi"><div class="kpi-label">Total Despesas</div><div class="kpi-value" style="color:var(--red);font-size:15px">${fmt(totalD)}</div></div>
    <div class="kpi"><div class="kpi-label">Resultado</div><div class="kpi-value" style="color:${totalR-totalD>=0?'var(--green)':'var(--red)'};font-size:15px">${fmt(totalR-totalD)}</div></div>
  </div>
  <div class="card"><div style="font-weight:700;margin-bottom:12px">Mês a mês — ${viewYear}</div><div style="overflow-x:auto"><div class="bar-chart">${bars}</div><div style="display:flex;gap:12px;justify-content:flex-end;margin-top:6px"><span style="color:var(--green);font-size:11px">■ Receitas</span><span style="color:var(--red);font-size:11px">■ Despesas</span></div></div></div>
  <div class="card" style="overflow-x:auto"><div style="font-weight:700;margin-bottom:12px">Detalhamento</div><table class="anual-table"><thead><tr><th>Mês</th><th>Receitas</th><th>Despesas</th><th>Saldo</th><th>Poupança</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}

// ── CATEGORIAS ────────────────────────────────────────────────────────────────
function renderCategorias(){
  const CATS=getCats();
  const usoCat={};
  entries.forEach(e=>{if(e.cat)usoCat[e.cat]=(usoCat[e.cat]||0)+1;});
  const catEntries=Object.entries(CATS).filter(([k])=>k!=='receita');
  const cards=catEntries.map(([key,cat])=>{
    const uso=usoCat[key]||0;
    const isDefault=DEFAULT_CATS[key]&&!(customCats[key]&&!customCats[key].isDefault);
    return`<div class="cat-card">
      <div class="cat-icon-big" style="background:${cat.color}22">${cat.icon}</div>
      <div class="cat-info">
        <div class="cat-name">${cat.label}</div>
        <div class="cat-meta">${uso} lançamento${uso!==1?'s':''} ${isDefault?'· <span style="font-size:10px;color:var(--muted)">padrão</span>':''}</div>
      </div>
      <div class="cat-actions">
        <button class="btn-sm" style="background:#4F8EF722;border-color:var(--accent);color:var(--accent)" onclick="openCatModal('${key}')">✏️</button>
        ${!DEFAULT_CATS[key]?`<button class="btn-sm" style="background:#F8717122;border-color:var(--red);color:var(--red)" onclick="deleteCat('${key}',${uso})">🗑️</button>`:''}
      </div>
    </div>`;
  }).join('');
  return`<div style="display:flex;justify-content:flex-end;margin-bottom:14px">
    <button onclick="openCatModal(null)" style="background:#2DD4BF22;border:1px solid var(--green);color:var(--green);border-radius:10px;padding:8px 16px;cursor:pointer;font-weight:700">+ Nova Categoria</button>
  </div>
  <div style="color:var(--muted);font-size:12px;margin-bottom:12px">As categorias padrão podem ser editadas (nome, cor, ícone) mas não removidas.</div>
  ${cards}`;
}

// ── MODAL CATEGORIA ───────────────────────────────────────────────────────────
let selCatColor=CAT_COLORS[0];
let selCatEmoji=CAT_EMOJIS[0];

function openCatModal(key){
  const CATS=getCats();
  const existing=key?CATS[key]:null;
  if(existing){selCatColor=existing.color;selCatEmoji=existing.icon;}
  else{selCatColor=CAT_COLORS[0];selCatEmoji=CAT_EMOJIS[0];}
  const box=document.getElementById('modal-box');
  box.className='modal-box';
  box.innerHTML=`<div class="modal-title">${existing?'✏️ Editar Categoria':'Nova Categoria'}<button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="form-group"><label>Nome</label><input type="text" id="cat-name" placeholder="Ex: Pet, Academia..." value="${existing?existing.label:''}"></div>
    <div class="form-group"><label>Ícone</label>
      <div class="emoji-grid" id="emoji-grid">${CAT_EMOJIS.map(em=>`<button class="emoji-btn${selCatEmoji===em?' sel':''}" onclick="selEmoji('${em}')">${em}</button>`).join('')}</div>
    </div>
    <div class="form-group"><label>Cor</label>
      <div class="color-grid">${CAT_COLORS.map(c=>`<div class="color-dot${selCatColor===c?' sel':''}" style="background:${c}" onclick="selColor('${c}')"></div>`).join('')}</div>
    </div>
    <div style="background:var(--surface);border-radius:12px;padding:12px;display:flex;align-items:center;gap:10px;margin-bottom:12px">
      <div id="cat-preview-icon" style="width:44px;height:44px;border-radius:12px;background:${selCatColor}22;display:flex;align-items:center;justify-content:center;font-size:24px">${selCatEmoji}</div>
      <div><div id="cat-preview-name" style="font-weight:700">${existing?existing.label:'Nome da categoria'}</div><div style="color:var(--muted);font-size:12px">Prévia</div></div>
    </div>
    <button class="btn-save" onclick="saveCat('${key||''}')">Salvar categoria</button>
    <button class="btn-cancel" onclick="closeModal()">Cancelar</button>`;
  document.getElementById('modal-overlay').classList.add('open');
  // live preview on name change
  document.getElementById('cat-name').addEventListener('input',function(){
    document.getElementById('cat-preview-name').textContent=this.value||'Nome da categoria';
  });
}

function selEmoji(em){
  selCatEmoji=em;
  document.querySelectorAll('.emoji-btn').forEach(b=>{b.classList.toggle('sel',b.textContent===em);});
  document.getElementById('cat-preview-icon').textContent=em;
}
function selColor(c){
  selCatColor=c;
  document.querySelectorAll('.color-dot').forEach(d=>{d.classList.toggle('sel',d.style.background===c);});
  document.getElementById('cat-preview-icon').style.background=c+'22';
}

function saveCat(key){
  const name=document.getElementById('cat-name').value.trim();
  if(!name){toast('Digite um nome!');return;}
  if(!key){
    // nova: gerar key única
    const newKey='cat_'+genId();
    customCats[newKey]={label:name,color:selCatColor,icon:selCatEmoji,isDefault:false};
  } else {
    // editar: salvar override
    customCats[key]={...(customCats[key]||{}),label:name,color:selCatColor,icon:selCatEmoji};
  }
  saveAll();closeModal();render();toast(key?'Categoria atualizada!':'Categoria criada!');
}

function deleteCat(key,uso){
  if(uso>0){if(!confirm(`Esta categoria tem ${uso} lançamento(s). Eles ficarão como "outros". Continuar?`))return;}
  else{if(!confirm('Remover esta categoria?'))return;}
  // reclassificar lançamentos para 'outros'
  entries=entries.map(e=>e.cat===key?{...e,cat:'outros'}:e);
  customCats[key]=null; // marcar como deletada
  saveAll();render();toast('Categoria removida!');
}

// ── ACTIONS ───────────────────────────────────────────────────────────────────
function aportar(id){const inp=document.getElementById('aporte-'+id);const v=parseFloat(inp.value);if(!v||v<=0)return;goals=goals.map(g=>g.id===id?{...g,current:Math.min(g.target,g.current+v)}:g);saveAll();render();toast('+'+fmt(v)+' aportado!');}
function deleteGoal(id){if(!confirm('Excluir esta meta?'))return;goals=goals.filter(g=>g.id!==id);saveAll();render();toast('Meta excluída!');}
function confirmDelete(id){if(!confirm('Excluir este lançamento?'))return;entries=entries.filter(e=>e.id!==id);saveAll();render();toast('Excluído!');}

function openDeleteSheet(id){
  const e=entries.find(x=>x.id===id);if(!e)return;
  const isParc=e.parcelas>1;const isRec=e.recurring;
  const box=document.getElementById('modal-box');box.className='del-sheet';
  box.innerHTML=`<div class="modal-title">🗑️ Excluir<button class="modal-close" onclick="closeModal()">×</button></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:16px">"${e.desc}" — ${fmt(e.value)}</div>
    <div class="del-opt" onclick="deleteOnlyThis('${id}')"><div class="del-opt-icon">📅</div><div><div class="del-opt-title">Só este mês</div><div class="del-opt-sub">Remove apenas ${MONTHS[e.month]}/${e.year}</div></div></div>
    ${isParc?`<div class="del-opt" onclick="deleteFromHere('${id}')"><div class="del-opt-icon">📅➡️</div><div><div class="del-opt-title">Este e os próximos</div><div class="del-opt-sub">A partir de ${MONTHS[e.month]}/${e.year}</div></div></div>`:''}
    ${(isParc||isRec)?`<div class="del-opt" onclick="deleteAllGroup('${id}')"><div class="del-opt-icon">🗑️</div><div><div class="del-opt-title" style="color:var(--red)">Todos</div><div class="del-opt-sub">${isParc?'Todas as parcelas':'Todas as recorrências'}</div></div></div>`:''}
    <button class="btn-cancel" onclick="closeModal()">Cancelar</button>`;
  document.getElementById('modal-overlay').classList.add('open');
}
function deleteOnlyThis(id){entries=entries.filter(e=>e.id!==id);saveAll();closeModal();render();toast('Excluído!');}
function deleteFromHere(id){const e=entries.find(x=>x.id===id);if(!e)return;const gid=e.groupId||e.id;entries=entries.filter(x=>!(x.groupId===gid&&x.parcelaAtual>=e.parcelaAtual)&&x.id!==id);saveAll();closeModal();render();toast('Parcelas removidas!');}
function deleteAllGroup(id){const e=entries.find(x=>x.id===id);if(!e)return;if(e.recurring){entries=entries.filter(x=>!(x.desc===e.desc&&x.cat===e.cat&&x.type===e.type&&x.recurring));}else{const gid=e.groupId||e.id;entries=entries.filter(x=>x.groupId!==gid&&x.id!==id);}saveAll();closeModal();render();toast('Todos excluídos!');}

// ── MODAL LANÇAMENTO ──────────────────────────────────────────────────────────
let modalType='despesa';
function openModal(){modalType='despesa';const box=document.getElementById('modal-box');box.className='modal-box';box.innerHTML=buildEntryForm(null);document.getElementById('modal-overlay').classList.add('open');}
function openEditModal(id){const e=entries.find(x=>x.id===id);if(!e)return;modalType=e.type;const box=document.getElementById('modal-box');box.className='modal-box';box.innerHTML=buildEntryForm(e);document.getElementById('modal-overlay').classList.add('open');}

function buildEntryForm(e){
  const CATS=getCats();
  const editing=!!e;const curType=e?e.type:modalType;
  const catOpts=Object.entries(CATS).filter(([k])=>k!=='receita').map(([k,v])=>`<option value="${k}"${e&&e.cat===k?' selected':''}>${v.icon} ${v.label}</option>`).join('');
  return`<div class="modal-title">${editing?'✏️ Editar':'Novo Lançamento'}<button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="type-toggle">
      <button class="type-btn ${curType==='receita'?'active-receita':''}" id="btn-receita" onclick="setModalType('receita')">↑ Receita</button>
      <button class="type-btn ${curType==='despesa'?'active-despesa':''}" id="btn-despesa" onclick="setModalType('despesa')">↓ Despesa</button>
    </div>
    <div class="form-group"><label>Descrição</label><input type="text" id="f-desc" placeholder="Ex: Supermercado" value="${e?e.desc:''}"></div>
    <div class="form-row">
      <div class="form-group" style="margin-bottom:0"><label>Valor (R$)</label><input type="number" id="f-value" placeholder="0,00" min="0" step="0.01" value="${e?e.value:''}"></div>
      <div class="form-group" style="margin-bottom:0" id="wrap-parcelas"${curType==='receita'?' style="display:none"':''}><label>Parcelas</label><input type="number" id="f-parcelas" value="${e?e.parcelas:1}" min="1" max="60"${editing?' disabled':''}></div>
    </div>
    <div class="form-group" id="wrap-cat"${curType==='receita'?' style="display:none"':''}><label>Categoria</label><select id="f-cat">${catOpts}</select></div>
    <div class="form-row3">
      <div class="form-group" style="margin-bottom:0"><label>Mês</label><select id="f-month">${MONTHS.map((m,i)=>`<option value="${i}"${(e?e.month:viewMonth)===i?' selected':''}>${m}</option>`).join('')}</select></div>
      <div class="form-group" style="margin-bottom:0"><label>Ano</label><input type="number" id="f-year" value="${e?e.year:viewYear}"></div>
      <div class="form-group" style="margin-bottom:0" id="wrap-due"${curType==='receita'?' style="display:none"':''}><label>Dia venc.</label><input type="number" id="f-due" placeholder="—" min="1" max="31" value="${e&&e.dueDay?e.dueDay:''}"></div>
    </div>
    <div style="margin-top:8px">
      <label class="check-row"><input type="checkbox" id="f-paid"${e&&e.paid?' checked':''}> Já pago / recebido</label>
      <label class="check-row" id="wrap-recurring"${curType==='receita'?' style="display:none"':''}><input type="checkbox" id="f-recurring"${e&&e.recurring?' checked':''}> Recorrente mensal</label>
    </div>
    ${editing?`<div style="background:var(--surface);border-radius:10px;padding:10px;margin:10px 0;font-size:12px;color:var(--muted)">ℹ️ Editando apenas ${MONTHS[e.month]}/${e.year}.</div><button class="btn-save" onclick="saveEdit('${e.id}')">Salvar alterações</button>`:`<button class="btn-save" onclick="saveEntry()">Salvar lançamento</button>`}
    <button class="btn-cancel" onclick="closeModal()">Cancelar</button>`;
}

function setModalType(type){
  modalType=type;
  document.getElementById('btn-receita').className='type-btn '+(type==='receita'?'active-receita':'');
  document.getElementById('btn-despesa').className='type-btn '+(type==='despesa'?'active-despesa':'');
  ['wrap-parcelas','wrap-cat','wrap-recurring','wrap-due'].forEach(id=>{const el=document.getElementById(id);if(el)el.style.display=type==='despesa'?'':'none';});
}

function saveEntry(){
  const desc=document.getElementById('f-desc').value.trim();
  const value=parseFloat(document.getElementById('f-value').value);
  const month=parseInt(document.getElementById('f-month').value);
  const year=parseInt(document.getElementById('f-year').value);
  const paid=document.getElementById('f-paid').checked;
  const parcelas=modalType==='despesa'?parseInt(document.getElementById('f-parcelas').value)||1:1;
  const cat=modalType==='despesa'?document.getElementById('f-cat').value:'receita';
  const recurring=modalType==='despesa'&&document.getElementById('f-recurring').checked;
  const dueDay=modalType==='despesa'?parseInt(document.getElementById('f-due').value)||null:null;
  if(!desc||!value||value<=0){toast('Preencha descrição e valor!');return;}
  const groupId=parcelas>1?genId():undefined;
  for(let i=0;i<parcelas;i++){const rawM=month+i;entries.push({id:genId(),type:modalType,cat,desc,value:Math.round(value*100)/100,month:rawM%12,year:year+Math.floor(rawM/12),paid:i===0?paid:false,parcelas,parcelaAtual:i+1,recurring,groupId,dueDay});}
  saveAll();closeModal();render();toast(parcelas>1?`${parcelas} parcelas lançadas!`:'Lançado com sucesso!');
}

function saveEdit(id){
  const desc=document.getElementById('f-desc').value.trim();
  const value=parseFloat(document.getElementById('f-value').value);
  const month=parseInt(document.getElementById('f-month').value);
  const year=parseInt(document.getElementById('f-year').value);
  const paid=document.getElementById('f-paid').checked;
  const cat=modalType==='despesa'?document.getElementById('f-cat').value:'receita';
  const recurring=modalType==='despesa'&&document.getElementById('f-recurring').checked;
  const dueDay=modalType==='despesa'?parseInt(document.getElementById('f-due').value)||null:null;
  if(!desc||!value||value<=0){toast('Preencha descrição e valor!');return;}
  entries=entries.map(e=>e.id===id?{...e,desc,value:Math.round(value*100)/100,month,year,paid,cat,type:modalType,recurring,dueDay}:e);
  saveAll();closeModal();render();toast('Lançamento atualizado!');
}

// ── MODAL META ─────────────────────────────────────────────────────────────────
const GOAL_COLORS=['#2DD4BF','#4F8EF7','#A78BFA','#FBBF24','#F87171','#34D399'];
let selGoalColor=GOAL_COLORS[0];
function openGoalModal(){
  const box=document.getElementById('modal-box');box.className='modal-box';
  box.innerHTML=`<div class="modal-title">Nova Meta<button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="form-group"><label>Nome da meta</label><input type="text" id="g-name" placeholder="Ex: Reserva de emergência"></div>
    <div class="form-row">
      <div class="form-group" style="margin-bottom:0"><label>Valor alvo (R$)</label><input type="number" id="g-target" placeholder="10000"></div>
      <div class="form-group" style="margin-bottom:0"><label>Valor atual (R$)</label><input type="number" id="g-current" placeholder="0" value="0"></div>
    </div>
    <div class="form-group" style="margin-top:12px"><label>Prazo (mês/ano)</label><input type="month" id="g-deadline"></div>
    <div class="form-group"><label>Cor</label><div class="color-grid">${GOAL_COLORS.map(c=>`<div class="color-dot${selGoalColor===c?' sel':''}" style="background:${c}" onclick="pickGoalColor('${c}')"></div>`).join('')}</div></div>
    <button class="btn-save" style="background:var(--purple)" onclick="saveGoal()">Criar meta</button>
    <button class="btn-cancel" onclick="closeModal()">Cancelar</button>`;
  document.getElementById('modal-overlay').classList.add('open');
}
function pickGoalColor(c){selGoalColor=c;document.querySelectorAll('#modal-box .color-dot').forEach(d=>{d.classList.toggle('sel',d.style.background===c);});}
function saveGoal(){
  const name=document.getElementById('g-name').value.trim();
  const target=parseFloat(document.getElementById('g-target').value);
  const current=parseFloat(document.getElementById('g-current').value)||0;
  const deadline=document.getElementById('g-deadline').value;
  if(!name||!target||target<=0){toast('Preencha nome e valor alvo!');return;}
  goals.push({id:genId(),name,target,current,deadline,color:selGoalColor});
  saveAll();closeModal();render();toast('Meta criada!');
}

function closeModal(){document.getElementById('modal-overlay').classList.remove('open');document.getElementById('modal-box').className='modal-box';}
document.getElementById('modal-overlay').addEventListener('click',function(e){if(e.target===this)closeModal();});
render();
</script>
</body>
</html>
